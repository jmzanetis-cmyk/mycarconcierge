[build]
  base       = "/"
  command    = "cd netlify/functions && npm install"
  publish    = "www"
  functions  = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"
  SECRETS_SCAN_ENABLED = "false"

[functions]
  node_bundler = "esbuild"
  included_files = []

[functions."outreach-cycle"]
  schedule = "*/15 * * * *"

[functions."outreach-followups"]
  schedule = "0 */6 * * *"

[functions."outreach-cleanup"]
  schedule = "0 0 * * 0"

[functions."payment-tracker-scheduled"]
  schedule = "0 */6 * * *"

[functions."daily-digest-scheduled"]
  schedule = "0 1 * * *"

[functions."apollo-discovery-scheduled"]
  schedule = "0 */6 * * *"

[functions."wefunder-blast-scheduled"]
  schedule = "0 2 * * 0"

# Agent Fleet — Phase 1
[functions."agent-orchestrator"]
  schedule = "* * * * *"

[functions."agent-analyst"]
  schedule = "0 5 * * *"

# BGC employee-level compliance — daily expiration sweep at 06:00 UTC
[functions."bgc-expiration-sweep"]
  schedule = "0 6 * * *"

# BGC reminder ladder + expired notifications + alerts at 13:00 UTC (~9am ET)
[functions."bgc-send-reminders"]
  schedule = "0 13 * * *"


[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"
