[build]
  base       = "/"
  # Build order:
  #   1. `cd netlify/functions && npm install` — installs function-only
  #      deps (resend, pdfkit, the nested @supabase/supabase-js, etc.)
  #      into `netlify/functions/node_modules/`.
  #   2. `npm test` — runs the in-process function regression tests
  #      (lockdown tests for admin-routes-auth, provider-application,
  #      driver-api, etc.). Any auth-guard regression on the agent-fleet
  #      or ai-ops admin handlers fails the build with a clear message
  #      instead of shipping silently.
  #
  # Why install MUST run before test (Task #343): the lockdown tests
  # `require()` real handler files like `agent-fleet-admin.js`,
  # `bgc-send-reminders.js`, `outreach-engine-core.js`, and
  # `daily-digest-scheduled.js`, which all `require('resend')`. `resend`
  # is declared in `netlify/functions/package.json` (NOT the root
  # package.json), so without installing function deps first, every
  # such test exits with `MODULE_NOT_FOUND: resend` and the deploy
  # fails. Netlify still runs root `npm install` automatically before
  # this command, so root deps (`@supabase/supabase-js` at the root
  # level, etc.) are already populated.
  #
  # Task #309 history: lockdown test files live in
  # `netlify/functions-tests/` (NOT `netlify/functions/`) so Netlify's
  # function bundler doesn't try to publish `*.test.js` as serverless
  # functions — the dot in `.test.js` is illegal in a function name
  # and was failing prod deploys.
  command    = "cd netlify/functions && npm install && cd ../.. && npm test"
  publish    = "www"
  functions  = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"
  SECRETS_SCAN_ENABLED = "false"

[functions]
  node_bundler = "esbuild"
  included_files = []

[functions."outreach-cycle"]
  schedule = "*/15 * * * *"

[functions."outreach-followups"]
  schedule = "0 */6 * * *"

[functions."outreach-cleanup"]
  schedule = "0 0 * * 0"

# Task #150 Light fix: payment-tracker-scheduled re-enabled, rewritten as a
# daily anomaly scanner over care_plan_completions. Findings are logged to
# ai_action_log for admin review on the AI Ops dashboard.
[functions."payment-tracker-scheduled"]
  schedule = "0 3 * * *"

[functions."daily-digest-scheduled"]
  schedule = "0 1 * * *"

[functions."apollo-discovery-scheduled"]
  schedule = "0 */6 * * *"

[functions."wefunder-blast-scheduled"]
  schedule = "0 2 * * 0"

# Agent Fleet — Phase 1
[functions."agent-orchestrator"]
  schedule = "* * * * *"

[functions."agent-analyst"]
  schedule = "0 5 * * *"

# Cron emitter: publishes nightly.tick onto the agent_events bus so the
# orchestrator can route to any agent that subscribes to nightly.tick
# (today: analyst). See netlify/functions/agent-cron-emitter.js header.
[functions."agent-cron-emitter"]
  schedule = "0 5 * * *"

# BGC employee-level compliance — daily expiration sweep at 06:00 UTC
[functions."bgc-expiration-sweep"]
  schedule = "0 6 * * *"

# BGC reminder ladder + expired notifications + alerts at 13:00 UTC (~9am ET)
[functions."bgc-send-reminders"]
  schedule = "0 13 * * *"

# Social acquisition monitor — polls enabled social_channels every 15 minutes,
# inserts new social_leads, and emits social.lead_discovered events for Hunter.
[functions."social-monitor-scheduled"]
  schedule = "*/15 * * * *"

# Task #161 — Gatekeeper smoke runs once a day off-hours (09:00 UTC ≈ 5am ET).
# Catches silent breakage of the trigger → bus → orchestrator → handler → DB
# pipeline within 24h. Failures alert the admin via the existing Resend path.
[functions."gatekeeper-smoke-scheduled"]
  schedule = "0 9 * * *"

# Task #206 — Matchmaker smoke runs daily at 09:15 UTC (staggered after the
# gatekeeper smoke so the orchestrator and Resend aren't fighting for capacity).
# Same early-warning model: synthetic care_plan.auction_closed event must
# produce a proposed agent_actions row with a recommended_winner_bid_id field.
[functions."matchmaker-smoke-scheduled"]
  schedule = "15 9 * * *"

# Task #206 — Treasurer smoke runs daily at 09:30 UTC. Synthetic payment
# captured / refund_requested / payout_failed events must each produce a
# proposed agent_actions row. While agent-treasurer is not yet deployed, this
# smoke fails loudly each day so the gap can't be silently forgotten.
[functions."treasurer-smoke-scheduled"]
  schedule = "30 9 * * *"

# Task #217 — Anthropic model availability smoke runs daily at 04:00 UTC.
# Pings every Claude model in MODELS_IN_USE with a 1-token request and alerts
# the admin (Resend + ai_action_log) if any model returns model_not_found,
# invalid_request_error, etc. Catches silent deprecations within 24h instead
# of waiting for a user to complain that a feature is broken.
[functions."anthropic-health-scheduled"]
  schedule = "0 4 * * *"

# Director agent — acquisition-focused chief-of-staff. Runs every 15 minutes,
# checks whether the other agents are actually pulling customers through the
# funnel, and pages the admin (SMS via Twilio + email via Resend) with the
# specific next action when any acquisition lever stalls. Daily digest fires
# at the 11:00 UTC tick (~7am ET) so silence is never ambiguous.
[functions."agent-director-scheduled"]
  schedule = "*/15 * * * *"

# Task #246 — daily Stripe secret key expiry check at 12:00 UTC. Reads the
# configured expiry date from ai_ops_settings, sends 3-day / 1-day / 0-day
# email reminders to the admin (idempotent via ai_action_log so re-runs in
# the same day don't double-send).
[functions."stripe-key-expiry-scheduled"]
  schedule = "0 12 * * *"


[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"
