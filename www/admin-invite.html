<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join the Team — My Car Concierge</title>
  <meta name="theme-color" content="#12161c">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fraunces:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #12161c;
      color: #f5f5f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container {
      width: 100%;
      max-width: 480px;
    }
    .brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .brand img {
      height: 80px;
      border-radius: 12px;
      filter: drop-shadow(0 6px 24px rgba(212, 168, 85, 0.25));
      margin-bottom: 16px;
    }
    .brand h1 {
      font-family: 'Fraunces', serif;
      font-size: 1.6rem;
      font-weight: 500;
      color: #c9a84c;
    }
    .brand p {
      color: #a0a8b8;
      font-size: 0.95rem;
      margin-top: 4px;
    }
    .card {
      background: linear-gradient(145deg, #1a202a, #141a24);
      border: 1px solid rgba(160, 168, 184, 0.15);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 8px;
      color: #a0a8b8;
    }
    .form-input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(30, 38, 48, 0.9);
      border: 1px solid rgba(160, 168, 184, 0.15);
      border-radius: 12px;
      color: #f5f5f7;
      font-family: inherit;
      font-size: 0.92rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus {
      border-color: #c9a84c;
    }
    .form-input[readonly] {
      opacity: 0.7;
      cursor: not-allowed;
    }
    .badge {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 12px;
      font-size: 0.82rem;
      font-weight: 600;
    }
    .badge-green { background: rgba(52, 211, 153, 0.12); color: #34d399; }
    .badge-blue { background: rgba(56, 189, 248, 0.12); color: #38bdf8; }
    .badge-purple { background: rgba(168, 85, 247, 0.15); color: #a855f7; }
    .badge-orange { background: rgba(251, 146, 60, 0.15); color: #fb923c; }
    .badge-gold { background: rgba(201, 162, 39, 0.18); color: #c9a84c; }
    .badge-teal { background: rgba(20, 184, 166, 0.15); color: #14b8a6; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px 24px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      background: linear-gradient(135deg, #c9a84c, #e6b84a);
      color: #12161c;
      box-shadow: 0 2px 12px rgba(201, 162, 39, 0.3);
    }
    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(201, 162, 39, 0.4);
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .error-msg {
      background: rgba(248, 113, 113, 0.15);
      border: 1px solid rgba(248, 113, 113, 0.3);
      color: #f87171;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 0.9rem;
      margin-bottom: 16px;
      display: none;
    }
    .success-card {
      text-align: center;
      padding: 40px 32px;
    }
    .success-card .checkmark {
      width: 64px;
      height: 64px;
      background: rgba(52, 211, 153, 0.12);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 32px;
    }
    .success-card h2 {
      font-family: 'Fraunces', serif;
      font-size: 1.4rem;
      margin-bottom: 12px;
      color: #34d399;
    }
    .success-card p {
      color: #a0a8b8;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    .success-card .btn {
      background: linear-gradient(135deg, #38bdf8, #5eb8f7);
      color: white;
      box-shadow: 0 2px 12px rgba(56, 189, 248, 0.3);
    }
    .loading {
      text-align: center;
      padding: 48px 24px;
      color: #a0a8b8;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(160, 168, 184, 0.15);
      border-top-color: #c9a84c;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .invalid-card {
      text-align: center;
      padding: 40px 32px;
    }
    .invalid-card .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .invalid-card h2 {
      font-family: 'Fraunces', serif;
      font-size: 1.3rem;
      margin-bottom: 12px;
      color: #f87171;
    }
    .invalid-card p {
      color: #a0a8b8;
      line-height: 1.6;
    }
    .password-hint {
      font-size: 0.8rem;
      color: #6b7280;
      margin-top: 4px;
    }
  </style>
<!-- SEO-INJECT:START -->
  <link rel="canonical" href="https://www.mycarconcierge.com/admin-invite.html" />
  <meta name="robots" content="noindex, nofollow" />
<!-- SEO-INJECT:END -->
</head>
<body>
  <div class="container">
    <div class="brand">
      <img src="logo.png" alt="My Car Concierge">
      <h1>Admin Team Setup</h1>
      <p>Complete your account to get started</p>
    </div>

    <div id="loading-state" class="card loading">
      <div class="spinner"></div>
      <p>Validating your invite...</p>
    </div>

    <div id="invalid-state" class="card invalid-card" style="display:none;">
      <div class="icon">⚠️</div>
      <h2>Invalid Invite</h2>
      <p id="invalid-reason">This invite link is invalid or has expired.</p>
    </div>

    <div id="form-state" class="card" style="display:none;">
      <div id="form-error" class="error-msg"></div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="invite-email" class="form-input" readonly>
      </div>
      <div class="form-group">
        <label class="form-label">Role</label>
        <div id="invite-role-badge"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Display Name</label>
        <input type="text" id="invite-name" class="form-input" placeholder="Your full name">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="invite-password" class="form-input" placeholder="Min 8 characters">
        <div class="password-hint">Must be at least 8 characters</div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" id="invite-confirm" class="form-input" placeholder="Re-enter password">
      </div>
      <button class="btn" id="submit-btn" onclick="submitForm()">Complete Setup</button>
    </div>

    <div id="success-state" class="card success-card" style="display:none;">
      <div class="checkmark">✓</div>
      <h2>Account Created!</h2>
      <p id="success-msg">Your admin account has been set up successfully.</p>
      <a href="/admin.html" class="btn" style="text-decoration:none;">Sign In to Admin Portal</a>
    </div>
  </div>

  <script>
    var inviteToken = null;

    var roleBadgeMap = {
      super_admin: { cls: 'badge-green', label: 'Super Admin' },
      crm_manager: { cls: 'badge-blue', label: 'CRM Manager' },
      marketing: { cls: 'badge-purple', label: 'Marketing' },
      operations: { cls: 'badge-orange', label: 'Operations' },
      finance: { cls: 'badge-gold', label: 'Finance' },
      support: { cls: 'badge-teal', label: 'Support' }
    };

    function showState(stateId) {
      ['loading-state', 'invalid-state', 'form-state', 'success-state'].forEach(function(id) {
        document.getElementById(id).style.display = id === stateId ? 'block' : 'none';
      });
    }

    async function validateToken() {
      var params = new URLSearchParams(window.location.search);
      inviteToken = params.get('token');
      if (!inviteToken) {
        document.getElementById('invalid-reason').textContent = 'No invite token provided. Please use the invite link you received.';
        showState('invalid-state');
        return;
      }
      try {
        var resp = await fetch('/api/admin/invite-validate?token=' + encodeURIComponent(inviteToken));
        var data = await resp.json();
        if (!data.valid) {
          document.getElementById('invalid-reason').textContent = data.reason || 'This invite link is invalid or has expired.';
          showState('invalid-state');
          return;
        }
        document.getElementById('invite-email').value = data.email;
        var roleInfo = roleBadgeMap[data.role] || { cls: 'badge-blue', label: data.role };
        document.getElementById('invite-role-badge').innerHTML = '<span class="badge ' + roleInfo.cls + '">' + roleInfo.label + '</span>';
        showState('form-state');
        document.getElementById('invite-name').focus();
      } catch (err) {
        document.getElementById('invalid-reason').textContent = 'Failed to validate invite. Please try again later.';
        showState('invalid-state');
      }
    }

    async function submitForm() {
      var errorEl = document.getElementById('form-error');
      var btn = document.getElementById('submit-btn');
      var name = document.getElementById('invite-name').value.trim();
      var password = document.getElementById('invite-password').value;
      var confirm = document.getElementById('invite-confirm').value;

      errorEl.style.display = 'none';

      if (!name) {
        errorEl.textContent = 'Please enter your display name.';
        errorEl.style.display = 'block';
        return;
      }
      if (password.length < 8) {
        errorEl.textContent = 'Password must be at least 8 characters.';
        errorEl.style.display = 'block';
        return;
      }
      if (password !== confirm) {
        errorEl.textContent = 'Passwords do not match.';
        errorEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Setting up...';

      try {
        var resp = await fetch('/api/admin/invite-accept', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: inviteToken, displayName: name, password: password })
        });
        var data = await resp.json();
        if (!resp.ok || !data.success) {
          throw new Error(data.error || 'Failed to create account');
        }
        var roleInfo = roleBadgeMap[data.role] || { label: data.role };
        document.getElementById('success-msg').textContent =
          'Your account (' + data.email + ') has been created as ' + roleInfo.label + '. You can now sign in.';
        showState('success-state');
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Complete Setup';
      }
    }

    document.addEventListener('DOMContentLoaded', validateToken);
  </script>
</body>
</html>
