[build]
  publish = "."
  functions = "netlify/functions"
  command = "cd netlify/functions && npm install"

[build.environment]
  SECRETS_SCAN_ENABLED = "false"

[functions."outreach-cycle"]
  schedule = "*/15 * * * *"

[functions."outreach-followups"]
  schedule = "0 */6 * * *"

[functions."outreach-cleanup"]
  schedule = "0 0 * * 0"

[[redirects]]
  from = "/api/survey/profile"
  to = "/.netlify/functions/survey-profile"
  status = 200

[[redirects]]
  from = "/t/o"
  to = "/.netlify/functions/email-tracking?a=open"
  status = 200

[[redirects]]
  from = "/t/c"
  to = "/.netlify/functions/email-tracking?a=click"
  status = 200

[[redirects]]
  from = "/api/agreements/sign"
  to = "/.netlify/functions/sign-agreement"
  status = 200

[[redirects]]
  from = "/api/stripe-key"
  to = "/.netlify/functions/stripe-key"
  status = 200

[[redirects]]
  from = "/api/config/stripe"
  to = "/.netlify/functions/stripe-key"
  status = 200

[[redirects]]
  from = "/api/split/guest-details/*"
  to = "/.netlify/functions/split-guest-details/:splat"
  status = 200

[[redirects]]
  from = "/api/split/guest-pay/*"
  to = "/.netlify/functions/split-guest-pay/:splat"
  status = 200

[[redirects]]
  from = "/api/split/guest-confirm/*"
  to = "/.netlify/functions/split-guest-confirm/:splat"
  status = 200

[[redirects]]
  from = "/api/split/pay/*"
  to = "/.netlify/functions/split-pay/:splat"
  status = 200

[[redirects]]
  from = "/api/invitations/*/accept"
  to = "/.netlify/functions/accept-invitation/:splat"
  status = 200

[[redirects]]
  from = "/api/invitations/*"
  to = "/.netlify/functions/validate-invitation/:splat"
  status = 200

[[redirects]]
  from = "/api/provider-referral/lookup/*"
  to = "/.netlify/functions/referral-lookup/:splat"
  status = 200

[[redirects]]
  from = "/api/provider-referral/process"
  to = "/.netlify/functions/referral-process"
  status = 200

[[redirects]]
  from = "/api/stripe-publishable-key"
  to = "/.netlify/functions/stripe-key"
  status = 200

[[redirects]]
  from = "/api/stripe/connect/onboard/*"
  to = "/.netlify/functions/stripe-connect-onboard/:splat"
  status = 200

[[redirects]]
  from = "/api/stripe/connect/callback"
  to = "/.netlify/functions/stripe-connect-callback"
  status = 200

[[redirects]]
  from = "/api/stripe/connect/status/*"
  to = "/.netlify/functions/stripe-connect-status/:splat"
  status = 200

[[redirects]]
  from = "/api/helpdesk"
  to = "/.netlify/functions/helpdesk"
  status = 200

[[redirects]]
  from = "/api/create-bid-checkout"
  to = "/.netlify/functions/create-bid-checkout"
  status = 200

[[redirects]]
  from = "/api/admin/outreach/*"
  to = "/.netlify/functions/outreach-admin/:splat"
  status = 200

[[redirects]]
  from = "/unsubscribe"
  to = "/.netlify/functions/outreach-unsubscribe"
  status = 200

[[redirects]]
  from = "/api/webhooks/resend"
  to = "/.netlify/functions/outreach-resend-webhook"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"
