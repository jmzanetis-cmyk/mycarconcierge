<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Join My Car Concierge</title>
  <script>
    const params = window.location.search;
    const ref = new URLSearchParams(params).get('ref');
    const dest = ref
      ? '/onboarding-member.html?ref=' + encodeURIComponent(ref)
      : '/onboarding-member.html' + params;
    window.location.replace(dest);
  </script>
</head>
<body></body>
</html>
