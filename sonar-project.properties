sonar.python.version=3.11

# HTML files are multi-page app templates with shared nav/header/footer boilerplate.
# Duplication is structural, not logical — exclude from CPD only.
# sonar.cpd.exclusions uses Ant-style globs where ** requires >=1 intermediate dir,
# so www/**/*.html misses direct children (www/index.html). **/*.html matches all.
# Reliability/security gates are overridden manually on this PR; inline-script
# hardening is tracked in a separate follow-up issue.
sonar.cpd.exclusions=**/*.html
